<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Display E-Ink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/material-darker.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/eclipse.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/neat.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/clike/clike.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        :root {
            --bg-primary: #1e1e1e;
            --bg-surface: #272822;
            --bg-elevated: #3e3d32;
            --accent: #a6e22e;
            --accent-hover: #8bc528;
            --text-primary: #f8f8f2;
            --text-secondary: #75715e;
            --border: #49483e;
        }

        html { height: 100%; }

        body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        #editor-container { height: 100vh; border-right: 1px solid var(--border); min-width: 0; }
        #editor { flex: 1; min-height: 0; }
        #preview { height: 100vh; min-width: 0; }

        .CodeMirror { height: 100%; }
        .CodeMirror-gutters { border-right: 1px solid var(--border) !important; }
        .error-line { background-color: rgba(249, 38, 114, 0.35) !important; }

        canvas {
            display: block;
            background: white;
            border: 2px solid var(--border);
            border-radius: 2px;
            transition: border-color 0.3s, box-shadow 0.3s;
            image-rendering: pixelated;
        }
        canvas.success-flash {
            border-color: var(--accent);
            box-shadow: 0 0 16px rgba(166, 226, 46, 0.3);
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(30, 30, 30, 0.6);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .loading-overlay.active { opacity: 1; }

        kbd { background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-primary); }
        #zoom-slider { width: 100px; accent-color: var(--accent); }

        #grid-toggle-btn.active {
            color: var(--accent) !important;
            border-color: var(--accent) !important;
        }

        @media (max-width: 768px) {
            body { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
            #editor-container { height: 50vh; border-right: none; border-bottom: 1px solid var(--border); }
            #preview { height: 50vh; }
        }
    </style>
</head>

<body>
    <div id="editor-container" class="d-flex flex-column">
        <div class="d-flex align-items-center gap-2 px-3 py-2 border-bottom flex-shrink-0" style="background:var(--bg-surface);border-color:var(--border)!important">
            <button class="btn btn-sm fw-semibold" style="background:var(--accent);color:#272822" onclick="sendCode()"><i class="bi bi-play-fill"></i> Rodar</button>
            <small class="d-inline-flex align-items-center gap-1" style="color:var(--text-secondary)"><kbd>Ctrl</kbd> + <kbd>Enter</kbd></small>
            <div class="d-inline-flex align-items-center gap-1 ms-auto">
                <i class="bi bi-palette" style="color:var(--text-secondary)"></i>
                <select id="theme-select" class="form-select form-select-sm" style="width:auto;background:var(--bg-elevated);color:var(--text-primary);border-color:var(--border)" onchange="setTheme(this.value)">
                <option value="monokai" selected>Monokai</option>
                <option value="dracula">Dracula</option>
                <option value="material-darker">Material Darker</option>
                <option value="eclipse">Eclipse</option>
                <option value="neat">Neat</option>
            </select>
            </div>
        </div>
        <div id="editor"></div>
    </div>
    <div id="preview" class="d-flex flex-column">
        <div class="d-flex align-items-center gap-2 px-3 py-2 border-bottom flex-shrink-0 small flex-wrap" style="background:var(--bg-surface);border-color:var(--border)!important">
            <button class="btn btn-sm" id="rotate-button" style="background:var(--bg-elevated);color:var(--text-primary);border:1px solid var(--border)" onclick="rotateCanvas()"><i class="bi bi-arrow-clockwise"></i> Rotação: 1</button>

            <div class="d-flex align-items-center gap-1" style="color:var(--text-secondary)">
                <i class="bi bi-zoom-in"></i>
                <input id="zoom-slider" type="range" min="10" max="100" step="0.1" value="10" oninput="applyScaleFromSlider()">
            </div>

            <button class="btn btn-sm px-2 py-0" id="grid-toggle-btn"
                    style="background:var(--bg-elevated);color:var(--text-secondary);border:1px solid var(--border)"
                    onclick="toggleGrid()" title="Toggle pixel grid">
                <i class="bi bi-grid-3x3"></i>
            </button>

            <span class="badge font-monospace ms-auto d-inline-flex align-items-center gap-1" id="coordinates" style="background:var(--bg-elevated);color:var(--text-primary)"><i class="bi bi-cursor"></i> x: -, y: -</span>
        </div>
        <div id="canvas-scroll-area" class="flex-grow-1"
             style="overflow:auto;display:flex;padding:16px;box-sizing:border-box;position:relative;">
            <div id="canvas-wrapper"
                 style="margin:auto;position:relative;display:inline-block;line-height:0;flex-shrink:0;">
                <canvas id="displayCanvas" width="296" height="128"></canvas>
                <div id="gridOverlay"
                     style="position:absolute;top:0;left:0;pointer-events:none;display:none;"></div>
            </div>
            <div class="loading-overlay" id="loading-overlay">
                <div class="spinner-border spinner-border-sm" style="color:var(--accent)" role="status"></div>
            </div>
        </div>
    </div>
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>


    <script>
        const editor = CodeMirror(document.getElementById('editor'), {
            mode: "text/x-arduino",
            lineNumbers: true,
            theme: "monokai",
            value:
`fontes.setFont( u8g2_font_helvB12_te );
fontes.setFontMode(1);
fontes.setCursor(50, 30);
fontes.print("Meu texto");

tela.fillRect(100, 50, 96, 28, GxEPD_BLACK);
tela.fillCircle(150, 63, 10, GxEPD_WHITE);

tela.drawLine(20, 110, 180, 110, GxEPD_BLACK);`
        });

        const canvas = document.getElementById('displayCanvas');
        const ctx = canvas.getContext('2d');
        const zoomSlider = document.getElementById('zoom-slider');
        const coordinatesBox = document.getElementById('coordinates');

        let rotationState = 1;

        // ── Zoom / pan / grid state ───────────────────────────────────────
        let currentScale = 1;
        let gridVisible = false;
        const scrollArea = document.getElementById('canvas-scroll-area');
        const gridCanvas = document.getElementById('gridOverlay');

        const themes = {
            monokai:           { bgPrimary:'#1e1e1e', bgSurface:'#272822', bgElevated:'#3e3d32', accent:'#a6e22e', accentHover:'#8bc528', textPrimary:'#f8f8f2', textSecondary:'#75715e', border:'#49483e' },
            dracula:           { bgPrimary:'#282a36', bgSurface:'#21222c', bgElevated:'#44475a', accent:'#bd93f9', accentHover:'#a673e6', textPrimary:'#f8f8f2', textSecondary:'#6272a4', border:'#44475a' },
            'material-darker': { bgPrimary:'#212121', bgSurface:'#1a1a1a', bgElevated:'#333333', accent:'#89ddff', accentHover:'#6bc5e8', textPrimary:'#eeffff', textSecondary:'#545454', border:'#333333' },
            eclipse:           { bgPrimary:'#ffffff', bgSurface:'#f5f5f5', bgElevated:'#e8e8e8', accent:'#1a73e8', accentHover:'#1557b0', textPrimary:'#1e1e1e', textSecondary:'#6e6e6e', border:'#d4d4d4' },
            neat:              { bgPrimary:'#fafafa', bgSurface:'#f0f0f0', bgElevated:'#e0e0e0', accent:'#2e7d32', accentHover:'#1b5e20', textPrimary:'#212121', textSecondary:'#757575', border:'#cccccc' },
        };

        function setTheme(name) {
            const t = themes[name];
            if (!t) return;
            const r = document.documentElement.style;
            r.setProperty('--bg-primary', t.bgPrimary);
            r.setProperty('--bg-surface', t.bgSurface);
            r.setProperty('--bg-elevated', t.bgElevated);
            r.setProperty('--accent', t.accent);
            r.setProperty('--accent-hover', t.accentHover);
            r.setProperty('--text-primary', t.textPrimary);
            r.setProperty('--text-secondary', t.textSecondary);
            r.setProperty('--border', t.border);
            editor.setOption('theme', name);
        }

        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const colorClass = type === 'error' ? 'text-bg-danger' : 'text-bg-success';
            const icon = type === 'error' ? 'bi-exclamation-circle' : 'bi-check-circle';
            const el = document.createElement('div');
            el.className = `toast align-items-center ${colorClass} border-0`;
            el.setAttribute('role', 'alert');
            el.innerHTML = `<div class="d-flex"><div class="toast-body"><i class="bi ${icon} me-2"></i>${message}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>`;
            container.appendChild(el);
            const toast = new bootstrap.Toast(el, { delay: 4000 });
            toast.show();
            el.addEventListener('hidden.bs.toast', () => el.remove());
        }

        async function sendCode() {
            const code = editor.getValue();
            const runBtn = document.querySelector('.btn');
            const overlay = document.getElementById('loading-overlay');

            // Save scroll position — canvas dimensions don't change on re-render.
            const savedScrollLeft = scrollArea.scrollLeft;
            const savedScrollTop  = scrollArea.scrollTop;

            runBtn.disabled = true;
            overlay.classList.add('active');

            try {
                const response = await fetch(window.location.href + '/process-code', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ "code": code, "rotacao": rotationState }),
                });
                const data = await response.json();
                if (!response.ok) {
                    displayErrorMessage(data.error, data.line);
                } else {
                    editor.eachLine(line => {
                        editor.removeLineClass(line, 'background', 'error-line');
                    });
                    renderCanvas(data.pixels);
                    updateGridOverlay();
                    canvas.classList.add('success-flash');
                    setTimeout(() => canvas.classList.remove('success-flash'), 600);

                    // Restore scroll after layout settles.
                    requestAnimationFrame(() => {
                        scrollArea.scrollLeft = savedScrollLeft;
                        scrollArea.scrollTop  = savedScrollTop;
                    });
                }
            } catch (error) {
                console.error("Erro ao enviar código:", error);
                displayErrorMessage("Erro de conexão ou servidor indisponível.", 0);
            } finally {
                runBtn.disabled = false;
                overlay.classList.remove('active');
            }
        }

        function displayErrorMessage(message, line) {
            if (line != 0){
                lineNumber = parseInt(line) - 1;
                editor.eachLine(line => {
                    editor.removeLineClass(line, 'background', 'error-line');
                });
                editor.addLineClass(lineNumber, 'background', 'error-line');
            }

            showToast(message, 'error');
        }

        function renderCanvas(pixels) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let y = 0; y < pixels.length; y++) {
                for (let x = 0; x < pixels[y].length; x++) {
                    ctx.fillStyle = pixels[y][x] == 1 ? "black" : "white";
                    ctx.fillRect(x, y, 1, 1);
                }
            }
        }

        // ── Zoom functions ────────────────────────────────────────────────

        /**
         * Apply a new zoom scale.
         * Updates canvas CSS size, grid overlay, and adjusts scroll so the
         * visible center remains centered (zoom-toward-center behavior).
         */
        function applyScale(newScale) {
            const oldScale = currentScale;
            const ratio = newScale / oldScale;

            // Compute new scroll positions before changing the DOM.
            const newScrollLeft = (scrollArea.scrollLeft + scrollArea.clientWidth  / 2) * ratio - scrollArea.clientWidth  / 2;
            const newScrollTop  = (scrollArea.scrollTop  + scrollArea.clientHeight / 2) * ratio - scrollArea.clientHeight / 2;

            currentScale = newScale;
            canvas.style.width  = (canvas.width  * currentScale) + 'px';
            canvas.style.height = (canvas.height * currentScale) + 'px';
            canvas.dataset.scale = currentScale;

            updateGridOverlay();

            // Apply scroll after layout reflow.
            requestAnimationFrame(() => {
                scrollArea.scrollLeft = Math.max(0, newScrollLeft);
                scrollArea.scrollTop  = Math.max(0, newScrollTop);
            });
        }

        /** Read the current slider value and call applyScale(). */
        function applyScaleFromSlider() {
            applyScale(parseFloat(zoomSlider.value) / 10);
        }

// ── Grid overlay functions ────────────────────────────────────────

        /**
         * Draw pixel-boundary grid lines using CSS background-image.
         * This guarantees exactly 1 CSS pixel per line regardless of zoom level.
         * Grid is only drawn when scale >= 2; below that, pixel cells are too
         * small for grid lines to be useful without obscuring the design.
         * All sizes derive from canvas.width/height — never hardcoded.
         */
        function drawGrid() {
            const scale = currentScale;
            const w = canvas.width;
            const h = canvas.height;

            gridCanvas.style.width  = (w * scale) + 'px';
            gridCanvas.style.height = (h * scale) + 'px';

            if (scale < 2) {
                // Cells too small — grid lines would cover the design
                gridCanvas.style.backgroundImage = 'none';
                return;
            }

            gridCanvas.style.backgroundImage =
                `linear-gradient(to right, rgba(100,100,100,0.3) 1px, transparent 1px),
                 linear-gradient(to bottom, rgba(100,100,100,0.3) 1px, transparent 1px)`;
            gridCanvas.style.backgroundSize = `${scale}px ${scale}px`;
        }

        /**
         * Refresh the grid overlay. Called after every applyScale() and rotation.
         * When grid is hidden, keeps CSS size in sync so toggling on is instant.
         */
        function updateGridOverlay() {
            if (!gridVisible) {
                gridCanvas.style.width  = (canvas.width  * currentScale) + 'px';
                gridCanvas.style.height = (canvas.height * currentScale) + 'px';
                return;
            }
            drawGrid();
        }

        /** Toggle pixel grid visibility on/off. */
        function toggleGrid() {
            gridVisible = !gridVisible;
            const btn = document.getElementById('grid-toggle-btn');
            if (gridVisible) {
                drawGrid();
                gridCanvas.style.display = 'block';
                btn.classList.add('active');
            } else {
                gridCanvas.style.display = 'none';
                btn.classList.remove('active');
            }
        }

        // ── Coordinate display ────────────────────────────────────────────

        let coordinatesLocked = false;

        function getCanvasCoords(event) {
            const canvasBorderWidth = 2;
            const rect = canvas.getBoundingClientRect();
            const scale = parseFloat(canvas.dataset.scale || 1);
            const x = Math.floor((event.clientX - rect.left - canvasBorderWidth) / scale);
            const y = Math.floor((event.clientY - rect.top - canvasBorderWidth) / scale);
            return { x, y };
        }

        canvas.addEventListener('mousemove', (event) => {
            if (coordinatesLocked) return;
            const { x, y } = getCanvasCoords(event);
            coordinatesBox.innerHTML = `<i class="bi bi-cursor"></i> x: ${x}, y: ${y}`;
        });

        canvas.addEventListener('mouseleave', () => {
            if (coordinatesLocked) return;
            coordinatesBox.innerHTML = `<i class="bi bi-cursor"></i> x: -, y: -`;
        });

        canvas.addEventListener('click', (event) => {
            if (coordinatesLocked) {
                coordinatesLocked = false;
                coordinatesBox.innerHTML = `<i class="bi bi-cursor"></i> x: -, y: -`;
            } else {
                const { x, y } = getCanvasCoords(event);
                coordinatesLocked = true;
                coordinatesBox.innerHTML = `<i class="bi bi-pin-angle-fill"></i> x: ${x}, y: ${y}`;
            }
        });

        // ── Rotation ──────────────────────────────────────────────────────

        function rotateCanvas() {
            rotationState = (rotationState + 1) % 4; // Alterna entre 0, 1, 2, 3
            const rotateButton = document.getElementById('rotate-button');
            rotateButton.innerHTML = `<i class="bi bi-arrow-clockwise"></i> Rotação: ${rotationState}`;

            if (rotationState === 0 || rotationState === 2) {
                // Vertical
                canvas.width = 128;
                canvas.height = 296;
            } else {
                // Horizontal
                canvas.width = 296;
                canvas.height = 128;
            }

            // Re-apply current scale for the new intrinsic dimensions.
            canvas.style.width  = (canvas.width  * currentScale) + 'px';
            canvas.style.height = (canvas.height * currentScale) + 'px';
            canvas.dataset.scale = currentScale;

            // Grid overlay must resize for the new canvas dimensions.
            updateGridOverlay();

            // Reset scroll — dimensions changed significantly.
            scrollArea.scrollLeft = 0;
            scrollArea.scrollTop  = 0;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            coordinatesLocked = false;
            coordinatesBox.innerHTML = `<i class="bi bi-cursor"></i> x: -, y: -`;
        }

        document.addEventListener('keydown', (event) => {
            if (event.ctrlKey && event.key === 'Enter') {
                sendCode();
            }
        });

        // ── Initialization ────────────────────────────────────────────────
        // Apply default 1× zoom via the standard path so CSS width/height
        // are set from the start (no transform:scale in effect).
        (function initZoom() {
            applyScale(1);
        })();

        // ── Self-tests (run once on load, output to console) ──────────────
        (function selfTest() {
            const errors = [];

            // T1: Required DOM elements exist
            ['canvas-scroll-area', 'canvas-wrapper', 'displayCanvas', 'gridOverlay',
             'zoom-slider', 'grid-toggle-btn'].forEach(id => {
                if (!document.getElementById(id))
                    errors.push('Missing element: #' + id);
            });

            // T2: Initial CSS width matches canvas.width * 1
            const expectedW = canvas.width * 1;
            const actualW = parseInt(canvas.style.width);
            if (actualW !== expectedW)
                errors.push('Initial CSS width wrong: got ' + actualW + ', expected ' + expectedW);

            // T3: applyScale sets currentScale and CSS width correctly
            applyScale(2);
            if (currentScale !== 2)
                errors.push('applyScale: currentScale not updated');
            if (parseInt(canvas.style.width) !== canvas.width * 2)
                errors.push('applyScale: CSS width not updated at 2x');
            applyScale(1); // restore

            // T4: getCanvasCoords returns {0,0} at the canvas top-left content corner
            const rect = canvas.getBoundingClientRect();
            const mockEvent = { clientX: rect.left + 2, clientY: rect.top + 2 };
            const coords = getCanvasCoords(mockEvent);
            if (coords.x !== 0 || coords.y !== 0)
                errors.push('getCanvasCoords: expected {0,0}, got {' + coords.x + ',' + coords.y + '}');

            // T5: gridCanvas starts hidden
            if (gridCanvas.style.display !== 'none')
                errors.push('gridCanvas should start hidden');

            if (errors.length === 0) {
                console.info('[self-test] All checks passed.');
            } else {
                errors.forEach(e => console.error('[self-test] FAIL:', e));
            }
        })();
    </script>
</body>

</html>
